<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock - V2 Integrated System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <section id="login-screen" class="flex-center">
        <div class="login-card">
            <h1>SmartStock<span>.</span></h1>
            <p>Silakan masuk (ADMIN, KASIR, GUDANG)</p>
            <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="password" placeholder="PASSWORD">
            <button onclick="app.handleLogin()" id="btn-login">Masuk Sistem</button>
        </div>
    </section>

    <section id="dashboard-screen" class="hidden">
        </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="index.js"></script>
</body>
</html>
